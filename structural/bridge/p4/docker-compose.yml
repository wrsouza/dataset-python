version: "3.9"

services:

  # ── APLICAÇÃO (CLI) ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    environment:
      PYTHONPATH: /app/src
    command: ["python", "-m", "exporter.cli", "--help"]
