<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>{{ title }}</title></head>
<body>
  <h1>{{ data.name }}</h1>
  <p><strong>Category:</strong> {{ data.category }}</p>
  <p><strong>Price:</strong> ${{ "%.2f"|format(data.price) }}</p>
  <p><strong>Stock:</strong> {{ data.stock }} units</p>
  <p>{{ data.description }}</p>
</body>
</html>
