version: "3.9"

services:
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      localstack:
        condition: service_healthy
    command: >
      python -m observability.cli process-order
      --customer-id cust-001 --item-sku SKU-123 --quantity 2 --unit-price 19.90

  # LocalStack simula AWS CloudWatch (metrics + logs) localmente para dev/integração.
  localstack:
    image: localstack/localstack:3.4
    environment:
      SERVICES: cloudwatch,logs
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5
