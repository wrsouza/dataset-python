version: "3.9"

services:

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: appdb
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy
    command: >
      flask --app orm_adapter.main run --host 0.0.0.0 --port 5001 --debug
    environment:
      DATABASE_URL: mysql+pymysql://app:secret@db:3306/appdb
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_DATABASE: appdb
