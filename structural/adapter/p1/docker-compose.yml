version: "3.9"

services:

  soap-server:
    build:
      context: ./soap_server
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/soap', data=b'<test/>')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      soap-server:
        condition: service_healthy
    command: >
      uvicorn soap_adapter.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      SOAP_SERVICE_URL: http://soap-server:5000
