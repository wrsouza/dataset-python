version: "3.9"

services:
  # ── APLICAÇÃO ───────────────────────────────────────────────────────────────
  # Sem serviços externos: a aplicação parseia e normaliza arquivos enviados
  # via upload, inteiramente em memória.
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "8501:8501"
    command: >
      streamlit run src/dataframe_adapter/infrastructure/app.py --server.port=8501 --server.address=0.0.0.0
