version: "3.9"

services:
  # ── APLICAÇÃO ───────────────────────────────────────────────────────────────
  # Sem serviços externos: o cache de Glyphs vive em memória, no processo da app.
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "8501:8501"
    command: >
      streamlit run src/main.py --server.port=8501 --server.address=0.0.0.0
