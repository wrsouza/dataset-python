version: "3.9"

services:

  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    environment:
      PYTHONPATH: /app/src
    ports:
      - "5000:5000"
    depends_on:
      localstack:
        condition: service_healthy
    command: >
      flask --app src.main run --host 0.0.0.0 --port 5000 --debug

  localstack:
    image: localstack/localstack:3.4
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_HOST: localstack
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  localstack_data:
