[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "proxy-p5-rate-limiting-proxy"
version = "0.1.0"
description = "Protection Proxy pattern: RateLimitingProxyServicer enforces a Redis-backed token bucket in front of a gRPC DataService"
requires-python = ">=3.11"
dependencies = [
    "grpcio>=1.60",
    "protobuf>=4.25",
    "redis>=5.0",
]

[project.optional-dependencies]
dev = [
    "grpcio-tools>=1.60",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "fakeredis>=2.20",
    "lupa>=2.0",
    "black>=24.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 88
target-version = ["py311"]
extend-exclude = "infrastructure/generated/"

[tool.ruff]
line-length = 88
target-version = "py311"
extend-exclude = ["src/rate_limiting/infrastructure/generated"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "PT"]
ignore = ["ANN101", "ANN102", "S101", "B008"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "ANN"]
# GetData overrides the gRPC-generated DataServiceServicer interface, whose
# method names follow protobuf/gRPC naming conventions (PascalCase), not PEP8.
"src/rate_limiting/infrastructure/real_data_service.py" = ["N802"]
"src/rate_limiting/infrastructure/rate_limiting_proxy.py" = ["N802"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = ["tests/", "src/rate_limiting/infrastructure/generated/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
addopts = [
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=html:htmlcov",
    "--cov-fail-under=80",
    "-v",
]

[tool.coverage.run]
source = ["src"]
omit = [
    "tests/*",
    "*/__init__.py",
    "src/rate_limiting/infrastructure/generated/*",
    "src/server.py",
    "src/client_example.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "@abstractmethod",
    "raise NotImplementedError",
]
