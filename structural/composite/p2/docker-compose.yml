# docker-compose — Virtual File System (Composite pattern + Flask + AWS S3)

version: "3.9"

services:

  # ── APLICAÇÃO ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: dev          # trocar por "prod" para produção
    volumes:
      - .:/app             # remover em prod
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - localstack
    command: >
      flask --app filesystem.app:app run --host 0.0.0.0 --port 8000 --reload

  # ── LOCALSTACK (emulação de AWS S3) ─────────────────────────────────────────
  # Os testes unitários/integração usam moto (mock em memória) e não
  # dependem deste serviço. Útil apenas para rodar a app manualmente
  # contra um S3 local sem credenciais reais da AWS.
  localstack:
    image: localstack/localstack:3.4
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  localstack_data:
