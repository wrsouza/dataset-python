version: "3.9"

services:
  # ── APLICAÇÃO ───────────────────────────────────────────────────────────────
  # Sem serviços externos: a definição do dashboard é lida de um arquivo JSON
  # local (examples/sales_dashboard.json).
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "8501:8501"
    command: >
      streamlit run src/main.py --server.port=8501 --server.address=0.0.0.0
