# docker-compose base — copiar e adaptar para cada projeto
# Manter apenas os serviços que o projeto realmente usa
# Referência: todos os serviços possíveis comentados abaixo

version: "3.9"

services:

  # ── APLICAÇÃO ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: dev          # trocar por "prod" para produção
    volumes:
      - .:/app             # remover em prod
    env_file: .env
    ports:
      - "8000:8000"        # ajustar porta conforme framework
    depends_on:
      db:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
      # rabbitmq:
      #   condition: service_healthy
    command: >             # ajustar comando conforme framework
      uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # ── POSTGRESQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 5s
      retries: 5

