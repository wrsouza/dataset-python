version: "3.9"

services:
  # ── APLICAÇÃO (CLI) ───────────────────────────────────────────────────────────
  # Sem serviços externos: o documento e seu histórico de snapshots vivem em
  # um arquivo SQLite local, montado como volume para persistir entre execuções.
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    # Padrão: roda os testes. Para usar a CLI:
    # docker-compose run --rm app python -m text_editor_memento.main write "hello"
    command: python -m pytest
