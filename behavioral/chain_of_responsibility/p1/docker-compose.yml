# Chain of Responsibility — Request Validation Chain
# No external services are required: validation runs entirely in memory.

version: "3.9"

services:
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "8000:8000"
    command: >
      uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
