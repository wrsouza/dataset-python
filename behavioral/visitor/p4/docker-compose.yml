version: "3.9"

services:
  # ── APLICAÇÃO (CLI) ───────────────────────────────────────────────────────────
  # Sem serviços externos: lê uma descrição JSON da estrutura de um módulo
  # (montada como volume) e roda visitors de métricas sobre ela.
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    # Padrão: roda os testes. Para usar a CLI:
    # docker-compose run --rm app python -m code_metrics_visitor.main analyze module.json --metric lines
    command: python -m pytest
