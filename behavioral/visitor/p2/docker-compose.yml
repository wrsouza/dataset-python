version: "3.9"

services:

  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    command: flask --app src/shopping_cart_visitors/app.py run --host 0.0.0.0 --port 5000 --debug

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: shopping_cart_visitors
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
