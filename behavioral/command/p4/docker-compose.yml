version: "3.9"

services:
  # ── APLICAÇÃO (CLI) ───────────────────────────────────────────────────────────
  # Sem serviços externos: o histórico e o estado vivem em um arquivo SQLite
  # local, montado como volume para persistir entre execuções da CLI.
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    # Padrão: roda os testes. Para usar a CLI:
    # docker-compose run --rm app python -m cli_history.main add "Buy milk"
    command: python -m pytest
