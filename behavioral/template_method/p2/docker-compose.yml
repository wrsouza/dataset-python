version: "3.9"

services:
  # ── APLICAÇÃO ───────────────────────────────────────────────────────────────
  # Sem serviços externos: relatórios gerados ficam em memória, dentro do
  # processo da aplicação Flask.
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    command: flask --app src/report_generation_template/app.py run --host 0.0.0.0 --port 5000 --debug
