version: "3.9"

services:

  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      localstack:
        condition: service_healthy
      mysql:
        condition: service_healthy
    # Padrão: roda os testes. Para usar a CLI:
    # docker-compose run --rm app python -m data_processing_pipeline.main process-csv my-bucket data.csv
    command: python -m pytest

  localstack:
    image: localstack/localstack:3.4
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_HOST: localstack
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4566/_localstack/health | grep -q '\"s3\": \"running\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: data_processing_pipeline
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  localstack_data:
