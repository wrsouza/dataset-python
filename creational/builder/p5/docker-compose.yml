version: "3.9"

services:

  # ── APLICAÇÃO ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: dev          # trocar por "prod" para produção
    volumes:
      - .:/app             # remover em prod
    env_file: .env
    command: ["python", "-m", "compose_builder", "list-presets"]
