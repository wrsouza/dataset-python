version: "3.9"

services:
  # ── APLICAÇÃO ───────────────────────────────────────────────────────────────
  # Sem serviços externos: o ModelRegistry vive em memória, dentro do processo
  # da aplicação Streamlit (Singleton de processo único).
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
    env_file: .env
    ports:
      - "8501:8501"
    command: >
      streamlit run src/model_registry/infrastructure/app.py --server.port=8501 --server.address=0.0.0.0
